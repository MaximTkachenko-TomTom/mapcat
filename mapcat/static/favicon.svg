<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <defs>
    <mask id="mapcat-mask">

      <!-- everything visible -->
      <rect width="100" height="100" fill="white"/>

      <!-- remove MapCat silhouette -->
      <path fill="black" d="
        M50 90
        L18 52
        L30 16
        L50 30
        L70 16
        L82 52
        Z
      "/>

      <!-- restore inner circle -->
      <circle cx="50" cy="52" r="0" fill="white"/>

    </mask>
  </defs>

  <!-- white favicon circle -->
  <circle cx="50" cy="50" r="48" fill="white" mask="url(#mapcat-mask)"/>

</svg>
