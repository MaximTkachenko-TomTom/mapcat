<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mapcat</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <link href="https://unpkg.com/maplibre-gl@5.16.0/dist/maplibre-gl.css" rel="stylesheet"/>
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
        /* ── Toolbox ─────────────────────────────────────────────────────────── */
        #toolbox {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: #2a2d2e;
            border: 1px solid #404445;
            border-radius: 10px;
            padding: 10px 12px;
            min-width: 170px;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            font-size: 13px;
            color: #eee;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            user-select: none;
        }
        .toolbox-logo-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 2px 0 6px;
        }
        .toolbox-logo-row svg { width: 20px; height: 20px; flex-shrink: 0; }
        .toolbox-brand { color: #fff; font-weight: 700; font-size: 13px; }
        .toolbox-ver { color: rgba(255,255,255,0.3); font-size: 11px; margin-left: auto; }
        #toolbox hr { border: none; border-top: 1px solid #404445; margin: 6px 0; }
        .toolbox-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 5px 4px;
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(255,255,255,0.65);
            border-radius: 4px;
            font-family: inherit;
            font-size: 13px;
            text-align: left;
            transition: background 0.1s, color 0.1s;
            box-sizing: border-box;
        }
        .toolbox-btn:hover { background: rgba(255,255,255,0.07); color: #fff; }
        .toolbox-btn .dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            flex-shrink: 0;
        }
        .toolbox-btn.on .dot { background: #4ec94e; box-shadow: 0 0 6px #4ec94e; }
        .toolbox-btn.danger { color: rgba(255,120,120,0.85); }
        .toolbox-btn.danger:hover { background: rgba(255,80,80,0.1); color: #ff9090; }
        .toolbox-btn.settings { color: rgba(255,255,255,0.4); }
        .toolbox-btn.settings:hover { color: #fff; background: rgba(255,255,255,0.07); }

        /* ── Settings panel ──────────────────────────────────────────────────── */
        #settingsPanel {
            display: none;
            position: absolute;
            z-index: 999;
            background: #2a2d2e;
            border: 1px solid #404445;
            border-radius: 10px;
            padding: 12px 14px;
            min-width: 220px;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            font-size: 13px;
            color: #eee;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        #settingsPanel.open { display: block; }
        .settings-section-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255,255,255,0.3);
            margin-bottom: 6px;
        }
        .style-list { list-style: none; margin: 0 0 8px; padding: 0; }
        .style-list li {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 4px;
            border-radius: 4px;
            cursor: pointer;
            color: rgba(255,255,255,0.65);
            transition: background 0.1s, color 0.1s;
        }
        .style-list li:hover { background: rgba(255,255,255,0.07); color: #fff; }
        .style-list li .style-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: rgba(255,255,255,0.15);
            flex-shrink: 0;
        }
        .style-list li.active { color: #fff; }
        .style-list li.active .style-dot { background: #4ec94e; box-shadow: 0 0 6px #4ec94e; }
        #settingsPanel hr { border: none; border-top: 1px solid #404445; margin: 8px 0; }
        .settings-action-btn {
            display: block;
            width: 100%;
            padding: 5px 4px;
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(255,255,255,0.4);
            border-radius: 4px;
            font-family: inherit;
            font-size: 13px;
            text-align: left;
            transition: background 0.1s, color 0.1s;
            box-sizing: border-box;
            margin-bottom: 2px;
        }
        .settings-action-btn:hover { background: rgba(255,255,255,0.07); color: #fff; }

        /* Custom style form */
        #customStyleForm { display: none; margin-top: 8px; }
        #customStyleForm input[type="text"] {
            display: block;
            width: 100%;
            box-sizing: border-box;
            padding: 6px 8px;
            background: #1e2122;
            border: 1px solid #404445;
            border-radius: 4px;
            color: #eee;
            font-size: 12px;
            font-family: inherit;
            margin-bottom: 4px;
            outline: none;
        }
        #customStyleForm input[type="text"]:focus { border-color: #7aa2f7; }
        #customStyleForm input[type="text"]::placeholder { color: rgba(255,255,255,0.2); }
        .custom-form-actions { display: flex; gap: 6px; }
        .custom-form-actions button {
            flex: 1;
            padding: 5px 0;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
        }
        .custom-form-actions .apply { background: #7aa2f7; color: #1e2122; font-weight: 600; }
        .custom-form-actions .apply:hover { background: #adc8ff; }
        .custom-form-actions .cancel-form { background: rgba(255,255,255,0.08); color: #eee; }
        .custom-form-actions .cancel-form:hover { background: rgba(255,255,255,0.14); }

        /* API key form */
        #apiKeyForm { display: none; margin-top: 8px; }
        #apiKeyForm input[type="text"] {
            display: block;
            width: 100%;
            box-sizing: border-box;
            padding: 6px 8px;
            background: #1e2122;
            border: 1px solid #404445;
            border-radius: 4px;
            color: #eee;
            font-size: 12px;
            font-family: inherit;
            margin-bottom: 4px;
            outline: none;
        }
        #apiKeyForm input[type="text"]:focus { border-color: #7aa2f7; }
        #apiKeyForm input[type="text"]::placeholder { color: rgba(255,255,255,0.2); }
        .api-key-actions { display: flex; gap: 6px; }
        .api-key-actions button {
            flex: 1;
            padding: 5px 0;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
        }
        .api-key-actions .save { background: #7aa2f7; color: #1e2122; font-weight: 600; }
        .api-key-actions .save:hover { background: #adc8ff; }
        .api-key-actions .cancel-key { background: rgba(255,255,255,0.08); color: #eee; }
        .api-key-actions .cancel-key:hover { background: rgba(255,255,255,0.14); }
    </style>
</head>
<body>
    <!-- Toolbox -->
    <div id="toolbox">
        <div class="toolbox-logo-row">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <mask id="toolbox-logo-mask">
                        <rect width="100" height="100" fill="white"/>
                        <path fill="black" d="M50 90 L18 52 L30 16 L50 30 L70 16 L82 52 Z"/>
                        <circle cx="50" cy="52" r="12" fill="white"/>
                    </mask>
                </defs>
                <circle cx="50" cy="50" r="48" fill="white" mask="url(#toolbox-logo-mask)"/>
            </svg>
            <span class="toolbox-brand">MapCat</span>
            <span class="toolbox-ver">__VERSION__</span>
        </div>
        <hr>
        <button id="autofocusBtn" class="toolbox-btn on">
            Auto-focus <span class="dot"></span>
        </button>
        <button id="followPositionBtn" class="toolbox-btn">
            Follow <span class="dot"></span>
        </button>
        <button id="clearBtn" class="toolbox-btn danger">Clear</button>
        <hr>
        <button id="settingsBtn" class="toolbox-btn settings">Settings…</button>
    </div>

    <!-- Settings panel -->
    <div id="settingsPanel">
        <div class="settings-section-label">Map style</div>
        <ul class="style-list" id="styleList">
            <li data-style="default" class="active">
                <span class="style-dot"></span> OSM Default
            </li>
            <li data-style="driving-light">
                <span class="style-dot"></span> Driving light
            </li>
        </ul>
        <button class="settings-action-btn" id="addCustomStyleBtn">+ Add custom style…</button>
        <div id="customStyleForm">
            <input type="text" id="styleUrlInput" placeholder="Style URL (use &lt;api_key&gt; as placeholder)"/>
            <div id="apiKeyInlineSection" style="display:none">
                <input type="text" id="apiKeyInlineInput" placeholder="API key…"/>
            </div>
            <div class="custom-form-actions">
                <button class="apply" id="applyCustomStyleBtn">Apply</button>
                <button class="cancel-form" id="cancelCustomStyleBtn">Cancel</button>
            </div>
        </div>
        <hr>
        <button class="settings-action-btn" id="changeApiKeyBtn">🔑 Change API key…</button>
        <div id="apiKeyForm">
            <input type="text" id="apiKeyInput" placeholder="API key…"/>
            <div class="api-key-actions">
                <button class="save" id="saveApiKeyBtn">Save</button>
                <button class="cancel-key" id="cancelApiKeyBtn">Cancel</button>
            </div>
        </div>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/maplibre-gl@5.16.0/dist/maplibre-gl.js"></script>
    <script>
    // Default OSM raster style — no API key required
    var DEFAULT_STYLE = {
        version: 8,
        sources: {
            osm: {
                type: 'raster',
                tiles: [
                    'https://a.tile.openstreetmap.org/{z}/{x}/{y}.png',
                    'https://b.tile.openstreetmap.org/{z}/{x}/{y}.png',
                    'https://c.tile.openstreetmap.org/{z}/{x}/{y}.png'
                ],
                tileSize: 256,
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }
        },
        layers: [{ id: 'osm-tiles', type: 'raster', source: 'osm' }]
    };

    function resolveInitialStyle() {
        var savedUrl = localStorage.getItem('mapcat_style_url');
        var savedKey = localStorage.getItem('mapcat_api_key');
        if (savedUrl) {
            return savedKey ? savedUrl.replace('<api_key>', savedKey) : savedUrl;
        }
        return DEFAULT_STYLE;
    }

    var map = new maplibregl.Map({
        container: 'map',
        style: resolveInitialStyle(),
        center: [13.416302, 52.527913],
        zoom: 14
    });

    // features: id -> { msg, layerIds, geoCoords }
    var features = {};
    // IDs removed while a style reload is in progress; filtered out on re-render
    var pendingRemovals = null;
    var currentPositionMarker = null;
    var previousPosition = null;
    var followPosition = false;
    var autofocus = true;

    var tooltip = new maplibregl.Popup({
        closeButton: false,
        closeOnClick: false,
        offset: 12
    });

    // Re-render all features after every style change (initial load + setStyle calls)
    map.on('style.load', function() {
        var savedFeatures = Object.assign({}, features);
        features = {};
        pendingRemovals = {};
        var savedAutofocus = autofocus;
        autofocus = false;
        Object.keys(savedFeatures).forEach(function(id) {
            if (!pendingRemovals[id]) renderFeature(savedFeatures[id].msg);
        });
        pendingRemovals = null;
        autofocus = savedAutofocus;
    });

    // ── Control panel ──────────────────────────────────────────────────────────

    var autofocusBtn      = document.getElementById('autofocusBtn');
    var followPositionBtn = document.getElementById('followPositionBtn');

    autofocusBtn.addEventListener('click', function() {
        autofocus = !autofocus;
        autofocusBtn.classList.toggle('on', autofocus);
    });

    followPositionBtn.addEventListener('click', function() {
        followPosition = !followPosition;
        followPositionBtn.classList.toggle('on', followPosition);
    });

    document.getElementById('clearBtn').addEventListener('click', function() {
        clearAllFeatures();
        if (currentPositionMarker) {
            currentPositionMarker.remove();
            currentPositionMarker = null;
            previousPosition = null;
        }
    });

    // Disable auto-focus and follow when user drags the map
    map.on('dragstart', function() {
        if (autofocus) {
            autofocus = false;
            autofocusBtn.classList.remove('on');
        }
        if (followPosition) {
            followPosition = false;
            followPositionBtn.classList.remove('on');
        }
    });

    // ── Settings panel ─────────────────────────────────────────────────────────

    var PREDEFINED_STYLES = {
        'default': null,  // null = use DEFAULT_STYLE object
        'driving-light': null  // placeholder — URL to be filled in later
    };

    var settingsPanel     = document.getElementById('settingsPanel');
    var customStyleForm   = document.getElementById('customStyleForm');
    var styleUrlInput     = document.getElementById('styleUrlInput');
    var apiKeyInlineInput = document.getElementById('apiKeyInlineInput');
    var apiKeyInlineSection = document.getElementById('apiKeyInlineSection');
    var apiKeyForm        = document.getElementById('apiKeyForm');
    var apiKeyInput       = document.getElementById('apiKeyInput');

    // Restore saved values
    styleUrlInput.value = localStorage.getItem('mapcat_style_url') || '';
    apiKeyInput.value   = localStorage.getItem('mapcat_api_key')   || '';
    apiKeyInlineInput.value = localStorage.getItem('mapcat_api_key') || '';

    function updateActiveStyle() {
        var savedUrl = localStorage.getItem('mapcat_style_url');
        document.querySelectorAll('#styleList li').forEach(function(li) {
            li.classList.remove('active');
        });
        if (!savedUrl) {
            var defaultLi = document.querySelector('#styleList li[data-style="default"]');
            if (defaultLi) defaultLi.classList.add('active');
        }
    }
    updateActiveStyle();

    document.getElementById('settingsBtn').addEventListener('click', function() {
        var isOpen = settingsPanel.classList.contains('open');
        if (!isOpen) {
            var rect = document.getElementById('toolbox').getBoundingClientRect();
            settingsPanel.style.left = (rect.right + 8) + 'px';
            settingsPanel.style.top  = rect.top + 'px';
        }
        settingsPanel.classList.toggle('open');
    });

    // Close settings when clicking outside both panels
    document.addEventListener('click', function(e) {
        if (!settingsPanel.contains(e.target) &&
            !document.getElementById('settingsBtn').contains(e.target)) {
            settingsPanel.classList.remove('open');
            customStyleForm.style.display = 'none';
            apiKeyForm.style.display = 'none';
        }
    });

    // Predefined style list clicks
    document.getElementById('styleList').addEventListener('click', function(e) {
        var li = e.target.closest('li');
        if (!li) return;
        var styleName = li.dataset.style;
        document.querySelectorAll('#styleList li').forEach(function(el) { el.classList.remove('active'); });
        li.classList.add('active');

        if (styleName === 'default') {
            localStorage.removeItem('mapcat_style_url');
            localStorage.removeItem('mapcat_api_key');
            map.setStyle(DEFAULT_STYLE);
        } else if (PREDEFINED_STYLES[styleName]) {
            var url = PREDEFINED_STYLES[styleName];
            var key = localStorage.getItem('mapcat_api_key') || '';
            var resolved = key ? url.replace('<api_key>', key) : url;
            localStorage.setItem('mapcat_style_url', url);
            map.setStyle(resolved);
        }
        // else: placeholder style — no-op
    });

    // Add custom style form
    document.getElementById('addCustomStyleBtn').addEventListener('click', function() {
        customStyleForm.style.display = customStyleForm.style.display === 'none' ? 'block' : 'none';
        apiKeyForm.style.display = 'none';
    });

    styleUrlInput.addEventListener('input', function() {
        apiKeyInlineSection.style.display =
            styleUrlInput.value.indexOf('<api_key>') !== -1 ? 'block' : 'none';
    });

    document.getElementById('applyCustomStyleBtn').addEventListener('click', function() {
        var url = styleUrlInput.value.trim();
        if (!url) return;
        var key = apiKeyInlineInput.value.trim() || localStorage.getItem('mapcat_api_key') || '';
        var resolved = key ? url.replace('<api_key>', key) : url;
        localStorage.setItem('mapcat_style_url', url);
        if (key) localStorage.setItem('mapcat_api_key', key);
        else localStorage.removeItem('mapcat_api_key');
        map.setStyle(resolved);
        customStyleForm.style.display = 'none';
        document.querySelectorAll('#styleList li').forEach(function(li) { li.classList.remove('active'); });
    });

    document.getElementById('cancelCustomStyleBtn').addEventListener('click', function() {
        styleUrlInput.value = localStorage.getItem('mapcat_style_url') || '';
        apiKeyInlineInput.value = localStorage.getItem('mapcat_api_key') || '';
        apiKeyInlineSection.style.display = 'none';
        customStyleForm.style.display = 'none';
    });

    // API key form
    document.getElementById('changeApiKeyBtn').addEventListener('click', function() {
        apiKeyForm.style.display = apiKeyForm.style.display === 'none' ? 'block' : 'none';
        customStyleForm.style.display = 'none';
        apiKeyInput.value = localStorage.getItem('mapcat_api_key') || '';
    });

    document.getElementById('saveApiKeyBtn').addEventListener('click', function() {
        var key = apiKeyInput.value.trim();
        if (key) localStorage.setItem('mapcat_api_key', key);
        else localStorage.removeItem('mapcat_api_key');
        // Re-apply current style with new key
        var savedUrl = localStorage.getItem('mapcat_style_url');
        if (savedUrl) {
            var resolved = key ? savedUrl.replace('<api_key>', key) : savedUrl;
            map.setStyle(resolved);
        }
        apiKeyForm.style.display = 'none';
    });

    document.getElementById('cancelApiKeyBtn').addEventListener('click', function() {
        apiKeyForm.style.display = 'none';
    });

    // ── WebSocket ──────────────────────────────────────────────────────────────

    var ws_port = location.port ? (parseInt(location.port) + 1) : 8081;
    var ws_url  = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.hostname + ':' + ws_port;
    var ws = new WebSocket(ws_url);
    ws.onopen  = function()  { console.log('WebSocket connected'); };
    ws.onclose = function()  { console.log('WebSocket disconnected'); };
    ws.onerror = function(e) { console.error('WebSocket error', e); };
    ws.onmessage = function(event) {
        try {
            var msg = JSON.parse(event.data);
            console.log('Received:', msg);
            handleMessage(msg);
        } catch (e) {
            console.error('Invalid message', event.data, e);
        }
    };

    function handleMessage(msg) {
        if (!msg || !msg.action) { console.warn('Message missing action', msg); return; }
        if      (msg.action === 'add')                     renderFeature(msg);
        else if (msg.action === 'remove')                  removeFeature(msg.id);
        else if (msg.action === 'remove-by-tag')           removeFeaturesByTag(msg.ids);
        else if (msg.action === 'clear')                   clearAllFeatures();
        else if (msg.action === 'update-current-position') updateCurrentPosition(msg.coords);
        else console.warn('Unknown action', msg.action);
    }

    // ── Coordinate helpers ─────────────────────────────────────────────────────
    // Protocol sends [lat, lng]; GeoJSON requires [lng, lat].

    function toGeoCoord(c)   { return [c[1], c[0]]; }
    function toGeoCoords(cs) { return cs.map(toGeoCoord); }

    function coordsBbox(geoCoords) {
        var minLng =  Infinity, minLat =  Infinity;
        var maxLng = -Infinity, maxLat = -Infinity;
        geoCoords.forEach(function(c) {
            if (c[0] < minLng) minLng = c[0];
            if (c[1] < minLat) minLat = c[1];
            if (c[0] > maxLng) maxLng = c[0];
            if (c[1] > maxLat) maxLat = c[1];
        });
        return [[minLng, minLat], [maxLng, maxLat]];
    }

    function allFeaturesBbox() {
        var all = [];
        Object.values(features).forEach(function(f) { all = all.concat(f.geoCoords); });
        return all.length ? coordsBbox(all) : null;
    }

    // ── Hover + tooltip ────────────────────────────────────────────────────────

    function addLayerHover(layerId, paintProps, layerType, label) {
        map.on('mouseenter', layerId, function(e) {
            map.getCanvas().style.cursor = 'pointer';
            if (label) tooltip.setLngLat(e.lngLat).setHTML(label).addTo(map);
            if (layerType === 'circle') {
                map.setPaintProperty(layerId, 'circle-color', '#FFD700');
                map.setPaintProperty(layerId, 'circle-stroke-color', '#FFD700');
            } else if (layerType === 'line') {
                map.setPaintProperty(layerId, 'line-color', '#FFD700');
                if (paintProps['line-width'] !== undefined) {
                    map.setPaintProperty(layerId, 'line-width', paintProps['line-width'] + 3);
                }
            } else if (layerType === 'fill') {
                map.setPaintProperty(layerId, 'fill-color', '#FFD700');
            }
        });
        map.on('mousemove', layerId, function(e) {
            if (label) tooltip.setLngLat(e.lngLat);
        });
        map.on('mouseleave', layerId, function() {
            map.getCanvas().style.cursor = '';
            tooltip.remove();
            Object.keys(paintProps).forEach(function(prop) {
                map.setPaintProperty(layerId, prop, paintProps[prop]);
            });
        });
    }

    // ── Feature rendering ──────────────────────────────────────────────────────

    function renderFeature(msg) {
        if (features[msg.id]) removeFeatureLayers(msg.id);

        var params    = msg.params || {};
        var color     = params.color   !== undefined ? params.color   : '#007cff';
        var label     = params.label   !== undefined ? params.label   : null;
        var opacity   = params.opacity !== undefined ? params.opacity : 1;
        var layerIds  = [];
        var geoCoords = [];

        if (msg.type === 'point') {
            var radius = params.radius !== undefined ? params.radius : 4;
            var border = params.border !== undefined ? params.border : 2;
            var gc = toGeoCoord(msg.coords);
            geoCoords = [gc];

            var srcId = 'src-' + msg.id;
            var lyrId = 'lyr-' + msg.id + '-circle';
            map.addSource(srcId, {
                type: 'geojson',
                data: { type: 'Feature', geometry: { type: 'Point', coordinates: gc }, properties: {} }
            });
            var paint = {
                'circle-radius':         radius,
                'circle-color':          color,
                'circle-opacity':        opacity,
                'circle-stroke-width':   border,
                'circle-stroke-color':   color,
                'circle-stroke-opacity': opacity
            };
            map.addLayer({ id: lyrId, type: 'circle', source: srcId, paint: paint });
            addLayerHover(lyrId, paint, 'circle', label);
            layerIds.push(lyrId);

        } else if (msg.type === 'polyline') {
            var width        = params.width        !== undefined ? params.width        : 2;
            var markerRadius = params.markers      !== undefined ? params.markers      : 0;
            var markerBorder = params.markerBorder !== undefined ? params.markerBorder : 2;
            geoCoords = toGeoCoords(msg.coords);

            var srcId     = 'src-' + msg.id;
            var lyrLineId = 'lyr-' + msg.id + '-line';
            map.addSource(srcId, {
                type: 'geojson',
                data: { type: 'Feature', geometry: { type: 'LineString', coordinates: geoCoords }, properties: {} }
            });
            var linePaint = {
                'line-color':   color,
                'line-width':   width,
                'line-opacity': opacity
            };
            map.addLayer({ id: lyrLineId, type: 'line', source: srcId, paint: linePaint });
            addLayerHover(lyrLineId, linePaint, 'line', label);
            layerIds.push(lyrLineId);

            if (markerRadius > 0) {
                var srcPtsId = 'src-' + msg.id + '-pts';
                var lyrPtsId = 'lyr-' + msg.id + '-pts';
                map.addSource(srcPtsId, {
                    type: 'geojson',
                    data: { type: 'Feature', geometry: { type: 'MultiPoint', coordinates: geoCoords }, properties: {} }
                });
                var ptsPaint = {
                    'circle-radius':         markerRadius,
                    'circle-color':          color,
                    'circle-opacity':        opacity,
                    'circle-stroke-width':   markerBorder,
                    'circle-stroke-color':   color,
                    'circle-stroke-opacity': opacity
                };
                map.addLayer({ id: lyrPtsId, type: 'circle', source: srcPtsId, paint: ptsPaint });
                addLayerHover(lyrPtsId, ptsPaint, 'circle', label);
                layerIds.push(lyrPtsId);
            }

        } else if (msg.type === 'polygon') {
            var border = params.border !== undefined ? params.border : 2;
            geoCoords = toGeoCoords(msg.coords);
            if (geoCoords.length === 0) {
                console.error('Empty coordinates for polygon', msg);
                return;
            }
            // GeoJSON Polygon ring must be closed
            var ring = geoCoords.concat([geoCoords[0]]);

            var srcId        = 'src-' + msg.id;
            var lyrFillId    = 'lyr-' + msg.id + '-fill';
            var lyrOutlineId = 'lyr-' + msg.id + '-outline';
            map.addSource(srcId, {
                type: 'geojson',
                data: { type: 'Feature', geometry: { type: 'Polygon', coordinates: [ring] }, properties: {} }
            });
            var fillPaint    = { 'fill-color': color, 'fill-opacity': opacity };
            var outlinePaint = { 'line-color': color, 'line-width': border, 'line-opacity': opacity };
            map.addLayer({ id: lyrFillId,    type: 'fill', source: srcId, paint: fillPaint });
            map.addLayer({ id: lyrOutlineId, type: 'line', source: srcId, paint: outlinePaint });
            addLayerHover(lyrFillId,    fillPaint,    'fill', label);
            addLayerHover(lyrOutlineId, outlinePaint, 'line', label);
            layerIds.push(lyrFillId);
            layerIds.push(lyrOutlineId);

        } else {
            console.warn('Unknown feature type', msg.type);
            return;
        }

        features[msg.id] = { msg: msg, layerIds: layerIds, geoCoords: geoCoords };

        if (autofocus) {
            var bbox = allFeaturesBbox();
            if (bbox) {
                var sw = bbox[0], ne = bbox[1];
                if (sw[0] === ne[0] && sw[1] === ne[1]) {
                    map.flyTo({ center: sw, zoom: map.getZoom() });
                } else {
                    map.fitBounds(bbox, { padding: 50 });
                }
            }
        }
    }

    function removeFeatureLayers(id) {
        var f = features[id];
        if (!f) return;
        f.layerIds.forEach(function(lyrId) {
            if (map.getLayer(lyrId)) map.removeLayer(lyrId);
        });
        ['src-' + id, 'src-' + id + '-pts'].forEach(function(srcId) {
            if (map.getSource(srcId)) map.removeSource(srcId);
        });
    }

    function removeFeature(id) {
        if (pendingRemovals) pendingRemovals[id] = true;
        if (features[id]) {
            removeFeatureLayers(id);
            delete features[id];
            console.log('Removed feature', id);
        } else if (!pendingRemovals) {
            console.warn('Feature not found', id);
        }
    }

    function removeFeaturesByTag(ids) {
        ids.forEach(function(id) {
            if (pendingRemovals) pendingRemovals[id] = true;
            if (features[id]) {
                removeFeatureLayers(id);
                delete features[id];
            }
        });
        console.log('Removed', ids.length, 'features by tag');
    }

    function clearAllFeatures() {
        Object.keys(features).forEach(removeFeatureLayers);
        features = {};
        console.log('Cleared all features');
    }

    function updateCurrentPosition(coords) {
        // coords: [lat, lng]
        var lat = coords[0], lng = coords[1];
        var rotation = 0;
        if (previousPosition) {
            var lat1 = previousPosition[0] * Math.PI / 180;
            var lat2 = lat * Math.PI / 180;
            var dLon = (lng - previousPosition[1]) * Math.PI / 180;
            var y = Math.sin(dLon) * Math.cos(lat2);
            var x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
            rotation = Math.atan2(y, x) * 180 / Math.PI;
        }
        var el = document.createElement('div');
        el.style.cssText = [
            'width:0', 'height:0',
            'border-left:10px solid transparent',
            'border-right:10px solid transparent',
            'border-bottom:20px solid #4285F4',
            'transform:rotate(' + rotation + 'deg)'
        ].join(';');

        if (currentPositionMarker) currentPositionMarker.remove();
        currentPositionMarker = new maplibregl.Marker({ element: el, anchor: 'center' })
            .setLngLat([lng, lat])
            .addTo(map);

        if (followPosition) map.setCenter([lng, lat]);
        previousPosition = coords;
    }
    </script>
</body>
